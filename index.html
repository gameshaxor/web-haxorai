<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HaxorAI • System Update</title>

  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 30px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .logo {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #00ff9d;
    }

    .title {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .desc {
      font-size: 14px;
      color: #8b949e;
      margin-bottom: 20px;
    }

    /* TERMINAL */
    .terminal {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      height: 90px;
      overflow: hidden;
      color: #00ff9d;
    }

    .line {
      opacity: 0;
      animation: fadeIn 0.5s forwards;
    }

    .line:nth-child(1) { animation-delay: 0.5s; }
    .line:nth-child(2) { animation-delay: 1.2s; }
    .line:nth-child(3) { animation-delay: 1.9s; }
    .line:nth-child(4) { animation-delay: 2.6s; }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* PROGRESS */
    .progress {
      margin-top: 15px;
      height: 6px;
      background: #21262d;
      border-radius: 5px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #00ff9d;
      animation: load 4s infinite;
    }

    @keyframes load {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #6e7681;
      text-align: right;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">HaxorAI</div>
    <div class="title">System Upgrade in Progress</div>
    <div class="desc">Kami sedang meningkatkan performa dan keamanan sistem.</div>

    <div class="terminal">
      <div class="line">> Initializing system...</div>
      <div class="line">> Updating core modules...</div>
      <div class="line">> Securing environment...</div>
      <div class="line">> Deploying new interface...</div>
    </div>

    <div class="progress">
      <div class="bar"></div>
    </div>

    <div class="footer">Please check back later</div>
  </div>

</body>
</html>
