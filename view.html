<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HaxorAI Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #00ff9d;
      font-family: monospace;
    }

    .topbar {
      padding: 10px;
      border-bottom: 1px solid #00ff9d33;
      display: flex;
      justify-content: space-between;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: white;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div id="fileName">Loading...</div>
  <div id="views">Views: 0</div>
</div>

<iframe id="viewer" sandbox="allow-scripts"></iframe>

<script>
const supabaseUrl = "https://efwgilbyldjvlbtrzwyn.supabase.co";
const supabaseKey = "sb_publishable_dhXYplciBTspJbYo2Q7p2Q_aJnf_vVL";
const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

let currentSlug = null;

/* =========================
   GET SLUG (CLEAN & RELIABLE)
========================= */
function getSlug() {
  let path = window.location.pathname;

  // production: /view/bjorka.html
  if (path.startsWith("/view/")) {
    return path.replace("/view/", "").split("?")[0].replace(/\/$/, "");
  }

  // dev fallback: /view?slug=bjorka.html
  const params = new URLSearchParams(window.location.search);
  return params.get("slug");
}

/* =========================
   VIEW COUNTER
========================= */
async function addView(id) {
  await sb.rpc("increment_views", { row_id: id });
}

/* =========================
   LOAD FILE
========================= */
async function loadFile() {
  const slug = getSlug();

  if (!slug) {
    document.body.innerHTML = "<h2>Invalid URL</h2>";
    return;
  }

  // prevent re-processing same slug
  if (currentSlug === slug) return;
  currentSlug = slug;

  // enforce clean URL (SEO friendly)
  if (window.location.pathname !== "/view/" + slug) {
    window.history.replaceState({}, "", "/view/" + slug);
  }

  // fetch from supabase
  const { data, error } = await sb
    .from("files")
    .select("*")
    .eq("slug", slug)
    .single();

  // NOT FOUND HANDLING (IMPORTANT FIX)
  if (error || !data) {
    document.getElementById("fileName").textContent = "404 Not Found";
    document.getElementById("views").textContent = "Views: 0";
    document.getElementById("viewer").srcdoc = "<h1 style='color:red;text-align:center;'>FILE NOT FOUND</h1>";
    return;
  }

  // UI update
  document.getElementById("fileName").textContent = data.name;
  document.getElementById("views").textContent = "Views: " + data.views;

  // render HTML safely
  const res = await fetch(data.url);
  const html = await res.text();

  document.getElementById("viewer").srcdoc = html;

  // track view
  addView(data.id);
}

/* =========================
   INIT
========================= */
window.addEventListener("DOMContentLoaded", loadFile);
</script>

</body>
</html>
