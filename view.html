<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HaxorAI Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #00ff9d;
      font-family: monospace;
    }

    .topbar {
      padding: 10px;
      border-bottom: 1px solid #00ff9d33;
      display: flex;
      justify-content: space-between;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: white;
    }

    .badge {
      color: #00ff9d;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div id="fileName">Loading...</div>
  <div id="views">Views: 0</div>
</div>

<iframe id="viewer" sandbox="allow-scripts"></iframe>

<script>
const supabaseUrl = "https://efwgilbyldjvlbtrzwyn.supabase.co";
const supabaseKey = "sb_publishable_dhXYplciBTspJbYo2Q7p2Q_aJnf_vVL";

const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   GET PARAM ID
========================= */
function getSlug() {
  const path = window.location.pathname;

  // 🔥 ambil apapun setelah /view/
  const match = path.match(/^\/view\/(.+)$/);

  if (match && match[1]) {
    return decodeURIComponent(match[1]);
  }

  // fallback query
  const params = new URLSearchParams(window.location.search);
  if (params.get("slug")) {
    return params.get("slug");
  }

  // fallback terakhir
  return localStorage.getItem("current_slug");
}
  
/* =========================
   ADD VIEW
========================= */
async function addView(id) {
  await sb.rpc("increment_views", { row_id: id });
}

/* =========================
   LOAD FILE
========================= */
async function loadFile() {

  let slug = getSlug();

  // 🔥 HARD FALLBACK (Cloudflare edge case)
  if (!slug && window.location.href.includes("/view/")) {
    slug = window.location.href.split("/view/")[1]?.split("?")[0];
  }

  if (!slug) {
    document.body.innerHTML = "<h2>Invalid URL</h2>";
    return;
  }

  // 🔥 NORMALIZE URL (WAJIB)
  if (window.location.pathname !== "/view/" + slug) {
    window.history.replaceState({}, "", "/view/" + slug);
  }
  
  const { data, error } = await sb
    .from("files")
    .select("*")
    .eq("slug", slug)
    .single();

  if (error || !data) {
    document.body.innerHTML = "<h2>File not found</h2>";
    return;
  }

  document.getElementById("fileName").textContent = data.name;
  document.getElementById("views").textContent = "Views: " + data.views;

  const res = await fetch(data.url);
  const html = await res.text();

  document.getElementById("viewer").srcdoc = html;

  addView(data.id);

  localStorage.setItem("current_slug", slug);
}
/* =========================
   INIT
========================= */
window.addEventListener("DOMContentLoaded", loadFile);
</script>

</body>
</html>
