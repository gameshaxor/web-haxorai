<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HaxorAI Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #00ff9d;
      font-family: monospace;
    }

    .topbar {
      padding: 10px;
      border-bottom: 1px solid #00ff9d33;
      display: flex;
      justify-content: space-between;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: white;
    }

    .badge {
      color: #00ff9d;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div id="fileName">Loading...</div>
  <div id="views">Views: 0</div>
</div>

<iframe id="viewer" sandbox="allow-scripts"></iframe>

<script>
const supabaseUrl = "https://efwgilbyldjvlbtrzwyn.supabase.co";
const supabaseKey = "sb_publishable_dhXYplciBTspJbYo2Q7p2Q_aJnf_vVL";
const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

let currentLoadedSlug = null;

/* =========================
   GET SLUG (CLEAN & RELIABLE)
========================= */
function getSlug() {
  const path = window.location.pathname;

  // /view/bjorka.html
  if (path.startsWith("/view/")) {
    return path
      .replace("/view/", "")
      .split("?")[0]
      .replace(/\/$/, "");
  }

  // fallback ?slug=
  const params = new URLSearchParams(window.location.search);
  return params.get("slug");
}

/* =========================
   ADD VIEW
========================= */
async function addView(id) {
  await sb.rpc("increment_views", { row_id: id });
}

/* =========================
   FORCE CLEAN URL (SAFE)
========================= */
function normalizeURL(slug) {
  const expected = "/view/" + slug;
  if (window.location.pathname !== expected) {
    window.history.replaceState({}, "", expected);
  }
}

/* =========================
   LOAD FILE (CORE FIX)
========================= */
async function loadFile() {
  const slug = getSlug();

  // ❌ STOP jika tidak ada slug
  if (!slug) {
    document.body.innerHTML = "<h2>Invalid URL</h2>";
    return;
  }

  // 🔥 FIX: kalau slug berubah → RESET STATE TOTAL
  if (currentLoadedSlug !== slug) {
    currentLoadedSlug = slug;
  }

  // 🔥 paksa URL selalu clean
  normalizeURL(slug);

  // =========================
  // FETCH DATA ALWAYS FRESH
  // =========================
  const { data, error } = await sb
    .from("files")
    .select("*")
    .eq("slug", slug)
    .maybeSingle();

  if (error || !data) {
    document.body.innerHTML = "<h2>File not found</h2>";
    return;
  }

  // UI update
  document.getElementById("fileName").textContent = data.name;
  document.getElementById("views").textContent = "Views: " + data.views;

  // render file
  const iframe = document.getElementById("viewer");

  const res = await fetch(data.url);
  const html = await res.text();

  iframe.srcdoc = html;

  // view tracking
  addView(data.id);
}

/* =========================
   HANDLE BROWSER NAV (IMPORTANT FIX)
========================= */
window.addEventListener("popstate", () => {
  loadFile(); // reload kalau user back/forward
});

/* =========================
   INIT
========================= */
window.addEventListener("DOMContentLoaded", loadFile);
</script>
</body>
</html>
