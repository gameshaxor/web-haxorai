<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HaxorAI Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #00ff9d;
      font-family: monospace;
    }

    .topbar {
      padding: 10px;
      border-bottom: 1px solid #00ff9d33;
      display: flex;
      justify-content: space-between;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: white;
    }

    .badge {
      color: #00ff9d;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div id="fileName">Loading...</div>
  <div id="views">Views: 0</div>
</div>

<iframe id="viewer" sandbox="allow-scripts"></iframe>

<script>
const supabaseUrl = "https://efwgilbyldjvlbtrzwyn.supabase.co";
const supabaseKey = "sb_publishable_dhXYplciBTspJbYo2Q7p2Q_aJnf_vVL";

const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   GET PARAM ID
========================= */
function getSlug() {
  const path = window.location.pathname;
  const search = window.location.search;
  const href = window.location.href;

  // ✅ 1. normal: /view/xxx.html
  if (path.startsWith("/view/") && path !== "/view") {
    return path.replace("/view/", "").split("?")[0];
  }

  // ✅ 2. fallback query
  const params = new URLSearchParams(search);
  if (params.get("slug")) {
    return params.get("slug");
  }

  // ✅ 3. 🔥 HARD fallback dari full URL
  if (href.includes("/view/")) {
    return href.split("/view/")[1].split("?")[0];
  }

  return null;
}
  
/* =========================
   ADD VIEW
========================= */
async function addView(id) {
  await sb.rpc("increment_views", { row_id: id });
}

/* =========================
   LOAD FILE
========================= */
async function loadFile() {

  const slug = getSlug();

  if (!slug) {
    document.body.innerHTML = "<h2>Invalid URL</h2>";
    return;
  }

  // 🔥 paksa URL SEO hanya jika belum benar
  if (!window.location.pathname.includes(slug)) {
    window.history.replaceState({}, "", "/view/" + slug);
  }

  const { data, error } = await sb
    .from("files")
    .select("*")
    .eq("slug", slug)
    .single();

  if (error || !data) {
    document.body.innerHTML = "<h2>File not found</h2>";
    return;
  }

  document.getElementById("fileName").textContent = data.name;
  document.getElementById("views").textContent = "Views: " + data.views;

  const res = await fetch(data.url + "?t=" + Date.now());
  const html = await res.text();

  document.getElementById("viewer").srcdoc = html;

  addView(data.id);
}
  
/* =========================
   INIT
========================= */
window.addEventListener("DOMContentLoaded", loadFile);
</script>

</body>
</html>
