<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HaxorAI Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #00ff9d;
      font-family: monospace;
    }

    .topbar {
      padding: 10px;
      border-bottom: 1px solid #00ff9d33;
      display: flex;
      justify-content: space-between;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: white;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div id="fileName">Loading...</div>
  <div id="views">Views: 0</div>
</div>

<iframe id="viewer" sandbox="allow-scripts"></iframe>

<script>
const supabaseUrl = "https://efwgilbyldjvlbtrzwyn.supabase.co";
const supabaseKey = "sb_publishable_dhXYplciBTspJbYo2Q7p2Q_aJnf_vVL";

const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   🔥 SUPER ROBUST SLUG PARSER
========================= */
function getSlug() {
  let slug = null;

  // 1. PRIORITAS: path (/view/xxx.html)
  const path = window.location.pathname;
  if (path.startsWith("/view/")) {
    slug = path.replace("/view/", "");
  }

  // 2. fallback: full URL parsing (anti Cloudflare bug)
  if (!slug) {
    const full = window.location.href;
    if (full.includes("/view/")) {
      slug = full.split("/view/")[1];
    }
  }

  // 3. fallback: query (?slug=)
  if (!slug) {
    const params = new URLSearchParams(window.location.search);
    slug = params.get("slug");
  }

  // 4. cleanup
  if (slug) {
    slug = slug.split("?")[0];
    slug = slug.replace(/\/$/, "");
  }

  return slug;
}

/* =========================
   ADD VIEW
========================= */
async function addView(id) {
  await sb.rpc("increment_views", { row_id: id });
}

/* =========================
   LOAD FILE
========================= */
async function loadFile() {

  const slug = getSlug();

  // ❌ kalau masih gagal → stop
  if (!slug) {
    document.body.innerHTML = "<h2>Invalid URL</h2>";
    return;
  }

  // 🔥 paksa URL tetap SEO (tapi aman)
  if (window.location.pathname !== "/view/" + slug) {
    window.history.replaceState({}, "", "/view/" + slug);
  }

  // =========================
  // FETCH DATA
  // =========================
  const { data, error } = await sb
    .from("files")
    .select("*")
    .eq("slug", slug)
    .single();

  if (error || !data) {
    document.body.innerHTML = "<h2>File not found</h2>";
    return;
  }

  // =========================
  // UI UPDATE
  // =========================
  document.getElementById("fileName").textContent = data.name;
  document.getElementById("views").textContent = "Views: " + data.views;

  // =========================
  // LOAD HTML KE IFRAME
  // =========================
  const res = await fetch(data.url);
  const html = await res.text();

  document.getElementById("viewer").srcdoc = html;

  // =========================
  // TRACK VIEW
  // =========================
  addView(data.id);
}

/* =========================
   INIT
========================= */
window.addEventListener("DOMContentLoaded", loadFile);
</script>

</body>
</html>
