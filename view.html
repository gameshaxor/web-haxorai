<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HaxorAI Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #00ff9d;
      font-family: monospace;
    }

    .topbar {
      padding: 10px;
      border-bottom: 1px solid #00ff9d33;
      display: flex;
      justify-content: space-between;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: white;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div id="fileName">Loading...</div>
  <div id="views">Views: 0</div>
</div>

<iframe id="viewer" sandbox="allow-scripts"></iframe>

<script>
const supabaseUrl = "https://efwgilbyldjvlbtrzwyn.supabase.co";
const supabaseKey = "sb_publishable_dhXYplciBTspJbYo2Q7p2Q_aJnf_vVL";

const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   CLEAN SLUG ROUTER (IMPORTANT)
   SUPPORT:
   /bjorka
   /bjorka/
   /view.html (BLOCK)
========================= */
function getSlug() {
  let path = window.location.pathname;

  // hapus slash awal & akhir
  path = path.replace(/^\/|\/$/g, "");

  // block akses view.html langsung
  if (path.includes("view.html")) return null;

  return path;
}

/* =========================
   VIEW COUNTER
========================= */
async function addView(id) {
  await sb.rpc("increment_views", { row_id: id });
}

/* =========================
   LOAD FILE BY SLUG
========================= */
async function loadFile() {
  const slug = getSlug();

  // ❌ jika tidak ada slug → stop
  if (!slug) {
    document.body.innerHTML = "<h2>Invalid Route</h2>";
    return;
  }

  // ambil data dari Supabase
  const { data, error } = await sb
    .from("files")
    .select("*")
    .eq("slug", slug)
    .single();

  if (error || !data) {
    document.body.innerHTML = "<h2>File Not Found</h2>";
    return;
  }

  // UI update
  document.getElementById("fileName").textContent = data.name;
  document.getElementById("views").textContent = "Views: " + (data.views || 0);

  // render HTML ke iframe (AMAN dari CORS issue)
  const iframe = document.getElementById("viewer");

  const res = await fetch(data.url);
  const html = await res.text();

  iframe.srcdoc = html;

  // tambah view
  addView(data.id);
}

/* =========================
   INIT
========================= */
window.addEventListener("DOMContentLoaded", loadFile);
</script>

</body>
</html>
