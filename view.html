<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HaxorAI Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #00ff9d;
      font-family: monospace;
    }

    .topbar {
      padding: 10px;
      border-bottom: 1px solid #00ff9d33;
      display: flex;
      justify-content: space-between;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: white;
    }

    .badge {
      color: #00ff9d;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div id="fileName">Loading...</div>
  <div id="views">Views: 0</div>
</div>

<iframe id="viewer" sandbox="allow-scripts"></iframe>

<script>
const supabaseUrl = "https://efwgilbyldjvlbtrzwyn.supabase.co";
const supabaseKey = "sb_publishable_dhXYplciBTspJbYo2Q7p2Q_aJnf_vVL";

const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   GET SLUG PARSER
========================= */
function getSlug() {
  const path = window.location.pathname;
  return path.split("/").pop().replace(".html", "");
}

/* =========================
   ADD VIEW
========================= */
async function addView(id) {
  await sb.rpc("increment_views", { row_id: id });
}

/* =========================
   LOAD FILE
========================= */
async function loadFile() {
  const slug = getSlug();

  if (!slug) {
    document.body.innerHTML = "<h2>Invalid slug</h2>";
    return;
  }

  const { data, error } = await sb
    .from("files")
    .select("*")
    .eq("slug", slug.toLowerCase())
    .maybeSingle();

  if (error || !data) {
    document.body.innerHTML = `
      <h2>File not found</h2>
      <p>Slug: ${slug}</p>
    `;
    return;
  }

  document.getElementById("fileName").textContent = data.name;

  const iframe = document.getElementById("viewer");

  try {
    const res = await fetch(data.url);
    const html = await res.text();
    iframe.srcdoc = html;
  } catch (e) {
    document.body.innerHTML = "<h2>Failed to load file</h2>";
    return;
  }

  addView(data.id);
}

/* =========================
   INIT
========================= */
window.addEventListener("DOMContentLoaded", loadFile);
</script>

</body>
</html>
