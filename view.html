<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HaxorAI Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #00ff9d;
      font-family: monospace;
    }

    .topbar {
      padding: 10px;
      border-bottom: 1px solid #00ff9d33;
      display: flex;
      justify-content: space-between;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: white;
    }

    .badge {
      color: #00ff9d;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div id="fileName">Loading...</div>
  <div id="views">Views: 0</div>
</div>

<iframe id="viewer" sandbox="allow-scripts"></iframe>

<script>
const supabaseUrl = "https://efwgilbyldjvlbtrzwyn.supabase.co";
const supabaseKey = "sb_publishable_dhXYplciBTspJbYo2Q7p2Q_aJnf_vVL";

const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   GET SLUG (FIX FINAL)
========================= */
function getSlug() {
  let path = window.location.pathname;

  // production: /view/bjorka.html
  if (path.startsWith("/view/")) {
    let slug = path.replace("/view/", "");
    slug = slug.split("?")[0];
    slug = slug.replace(/\/$/, "");
    return slug;
  }

  // fallback: /view?slug=
  const params = new URLSearchParams(window.location.search);
  return params.get("slug");
}

/* =========================
   ADD VIEW
========================= */
async function addView(id) {
  await sb.rpc("increment_views", { row_id: id });
}

/* =========================
   LOAD FILE
========================= */
async function loadFile() {

  const slug = getSlug();

  // 🔥 FORCE CLEAN URL (SEO CONSISTENT)
  if (slug && window.location.pathname !== "/view/" + slug) {
    window.history.replaceState({}, "", "/view/" + slug);
  }

  // VALIDATION
  if (!slug) {
    document.body.innerHTML = "<h2>Invalid URL</h2>";
    return;
  }

  // FETCH DATA
  const { data, error } = await sb
    .from("files")
    .select("*")
    .eq("slug", slug)
    .single();

  if (error || !data) {
    document.body.innerHTML = "<h2>File not found</h2>";
    return;
  }

  // UI UPDATE
  document.getElementById("fileName").textContent = data.name;
  document.getElementById("views").textContent = "Views: " + data.views;

  const iframe = document.getElementById("viewer");

  // load HTML safely
  const res = await fetch(data.url);
  const html = await res.text();

  iframe.srcdoc = html;

  // track view
  addView(data.id);
}

/* =========================
   INIT
========================= */
window.addEventListener("DOMContentLoaded", loadFile);
</script>

</body>
</html>
