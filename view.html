<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HaxorAI Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #00ff9d;
      font-family: monospace;
    }

    .topbar {
      padding: 10px;
      border-bottom: 1px solid #00ff9d33;
      display: flex;
      justify-content: space-between;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: white;
    }

    .badge {
      color: #00ff9d;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div id="fileName">Loading...</div>
  <div id="views">Views: 0</div>
</div>

<iframe id="viewer" sandbox="allow-scripts"></iframe>

<script>
const supabaseUrl = "https://efwgilbyldjvlbtrzwyn.supabase.co";
const supabaseKey = "sb_publishable_dhXYplciBTspJbYo2Q7p2Q_aJnf_vVL";

const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   GET PARAM ID
========================= */
function getSlug() {
  let path = window.location.pathname;

  // 🔥 ambil hanya bagian setelah /view/
  if (path.startsWith("/view/")) {
    let slug = path.substring("/view/".length);

    // buang query & slash
    slug = slug.split("?")[0].replace(/^\/+|\/+$/g, "");

    // 🔥 FIX: kalau ada "view/" dobel, buang
    if (slug.startsWith("view/")) {
      slug = slug.replace("view/", "");
    }

    return slug;
  }

  // fallback query
  const params = new URLSearchParams(window.location.search);
  return params.get("slug");
}
  
/* =========================
   ADD VIEW
========================= */
async function addView(id) {
  await sb.rpc("increment_views", { row_id: id });
}

/* =========================
   LOAD FILE
========================= */
async function loadFile() {

  let slug = getSlug();

  if (!slug) {
    document.body.innerHTML = "<h2>Invalid URL</h2>";
    return;
  }

  // 🔥 pastikan URL selalu bersih (tidak dobel)
  const cleanPath = "/view/" + slug;

  if (window.location.pathname !== cleanPath) {
    window.history.replaceState({}, "", cleanPath);
  }

  // =========================
  // FETCH DATABASE
  // =========================
  const { data, error } = await sb
    .from("files")
    .select("*")
    .eq("slug", slug)
    .single();

  if (error || !data) {
    document.body.innerHTML = "<h2>File not found</h2>";
    return;
  }

  // =========================
  // UPDATE UI
  // =========================
  document.getElementById("fileName").textContent = data.name;
  document.getElementById("views").textContent = "Views: " + data.views;

  // =========================
  // LOAD HTML (ANTI CACHE)
  // =========================
  const res = await fetch(data.url + "?t=" + Date.now());
  const html = await res.text();

  document.getElementById("viewer").srcdoc = html;

  addView(data.id);
}
/* =========================
   INIT
========================= */
window.addEventListener("DOMContentLoaded", loadFile);
</script>

</body>
</html>
