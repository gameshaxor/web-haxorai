<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HaxorAI Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #00ff9d;
      font-family: monospace;
    }

    .topbar {
      padding: 10px;
      border-bottom: 1px solid #00ff9d33;
      display: flex;
      justify-content: space-between;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: white;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div id="fileName">Loading...</div>
  <div id="views">Views: 0</div>
</div>

<iframe id="viewer" sandbox="allow-scripts"></iframe>

<script>
const supabaseUrl = "https://efwgilbyldjvlbtrzwyn.supabase.co";
const supabaseKey = "sb_publishable_dhXYplciBTspJbYo2Q7p2Q_aJnf_vVL";

const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   GET SLUG (FINAL FIX)
========================= */
function getSlug() {
  const path = window.location.pathname;

  // 🔥 LOCALHOST MODE
  if (path.includes("view.html")) {
    const params = new URLSearchParams(window.location.search);
    return params.get("slug");
  }

  // 🔥 PRODUCTION MODE (/view/nama.html)
  const parts = path.split("/");

  // contoh:
  // ["", "view", "3d-pyramid.html"]
  if (parts.length >= 3) {
    return parts[2];
  }

  return null;
}

/* =========================
   ADD VIEW
========================= */
async function addView(id) {
  try {
    await sb.rpc("increment_views", { row_id: id });
  } catch (e) {
    console.warn("View increment failed");
  }
}

/* =========================
   LOAD FILE
========================= */
async function loadFile() {
  const slug = getSlug();

  console.log("Slug:", slug); // DEBUG

  if (!slug) {
    document.body.innerHTML = "<h2>Invalid URL</h2>";
    return;
  }

  const { data, error } = await sb
    .from("files")
    .select("*")
    .eq("slug", slug)
    .single();

  if (error || !data) {
    console.error(error);
    document.body.innerHTML = "<h2>File not found</h2>";
    return;
  }

  // UI
  document.getElementById("fileName").textContent = data.name;
  document.getElementById("views").textContent = "Views: " + data.views;

  // LOAD HTML
  try {
    const res = await fetch(data.url);
    const html = await res.text();

    document.getElementById("viewer").srcdoc = html;
  } catch (err) {
    console.error(err);
    document.body.innerHTML = "<h2>Failed to load file</h2>";
  }

  // increment view
  addView(data.id);
}

/* =========================
   INIT
========================= */
window.addEventListener("DOMContentLoaded", loadFile);
</script>

</body>
</html>
