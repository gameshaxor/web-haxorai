<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HaxorAI Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #00ff9d;
      font-family: monospace;
    }

    .topbar {
      padding: 10px;
      border-bottom: 1px solid #00ff9d33;
      display: flex;
      justify-content: space-between;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: white;
    }

    .badge {
      color: #00ff9d;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div id="fileName">Loading...</div>
  <div id="views">Views: 0</div>
</div>

<iframe id="viewer" sandbox="allow-scripts"></iframe>

<script>
const supabaseUrl = "https://efwgilbyldjvlbtrzwyn.supabase.co";
const supabaseKey = "sb_publishable_dhXYplciBTspJbYo2Q7p2Q_aJnf_vVL";

const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   GET PARAM ID
========================= */
function getSlug() {
  const params = new URLSearchParams(window.location.search);
  let slug = params.get("slug");

  // kalau tidak ada di query, ambil dari path
  if (!slug) {
    const path = window.location.pathname;

    if (path.startsWith("/view/")) {
      slug = path.replace("/view/", "");
      slug = slug.split("?")[0];
      slug = slug.replace(/\/$/, "");
    }
  }

  return slug;
}
  
/* =========================
   ADD VIEW
========================= */
async function addView(id) {
  await sb.rpc("increment_views", { row_id: id });
}

/* =========================
   LOAD FILE
========================= */
async function loadFile() {

  // =========================
  // 🔥 FORCE SEO URL SYNC
  // =========================
  const params = new URLSearchParams(window.location.search);
  const slugFromQuery = params.get("slug");

  if (slugFromQuery && window.location.pathname === "/view") {
    window.history.replaceState({}, "", "/view/" + slugFromQuery);
  }

  // =========================
  // ambil slug setelah URL dirapikan
  // =========================
  const slug = getSlug();

  if (!slug) {
    document.body.innerHTML = "<h2>Invalid URL</h2>";
    return;
  }

  const { data, error } = await sb
    .from("files")
    .select("*")
    .eq("slug", slug)
    .single();

  if (error || !data) {
    document.body.innerHTML = "<h2>File not found</h2>";
    return;
  }

  document.getElementById("fileName").textContent = data.name;
  document.getElementById("views").textContent = "Views: " + data.views;

  const iframe = document.getElementById("viewer");

  const res = await fetch(data.url);
  const html = await res.text();

  iframe.srcdoc = html;

  addView(data.id);
}
/* =========================
   INIT
========================= */
window.addEventListener("DOMContentLoaded", loadFile);
</script>

</body>
</html>
