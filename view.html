<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HaxorAI Viewer</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #00ff9d;
      font-family: monospace;
    }

    .topbar {
      padding: 10px;
      border-bottom: 1px solid #00ff9d33;
      display: flex;
      justify-content: space-between;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: white;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div id="fileName">Loading...</div>
  <div id="views">Views: 0</div>
</div>

<iframe id="viewer" sandbox="allow-scripts"></iframe>

<script>
const supabaseUrl = "https://efwgilbyldjvlbtrzwyn.supabase.co";
const supabaseKey = "sb_publishable_dhXYplciBTspJbYo2Q7p2Q_aJnf_vVL";

const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   GET PARAMS
========================= */
function getParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    id: params.get("id"),
    slug: params.get("slug")
  };
}

/* =========================
   ADD VIEW
========================= */
async function addView(id) {
  await sb.rpc("increment_views", { row_id: id });
}

/* =========================
   LOAD FILE (SUPPORT ID + SLUG)
========================= */
async function loadFile() {
  const { id, slug } = getParams();

  if (!id && !slug) {
    document.body.innerHTML = "<h2>Invalid request</h2>";
    return;
  }

  let query = sb.from("files").select("*");

  if (id) {
    query = query.eq("id", id);
  } else if (slug) {
    query = query.eq("slug", slug);
  }

  const { data, error } = await query.single();

  if (error || !data) {
    document.body.innerHTML = "<h2>File not found</h2>";
    return;
  }

  // update UI
  document.getElementById("fileName").textContent = data.name;
  document.getElementById("views").textContent = "Views: " + (data.views + 1);

  // render HTML
  const iframe = document.getElementById("viewer");

  try {
    const res = await fetch(data.url);
    const html = await res.text();
    iframe.srcdoc = html;
  } catch (err) {
    document.body.innerHTML = "<h2>Failed to load file</h2>";
    return;
  }

  // tracking
  addView(data.id);
}

/* =========================
   INIT
========================= */
window.addEventListener("DOMContentLoaded", loadFile);
</script>

</body>
</html>
