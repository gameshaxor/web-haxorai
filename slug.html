<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<script>
const supabaseUrl = "https://efwgilbyldjvlbtrzwyn.supabase.co";
const supabaseKey = "sb_publishable_dhXYplciBTspJbYo2Q7p2Q_aJnf_vVL";
const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

// ambil slug dari URL
const slug = window.location.pathname.split("/").pop().replace(".html","");

async function redirect() {
  const { data, error } = await sb
    .from("files")
    .select("*")
    .eq("slug", slug)
    .single();

  if (error || !data) {
    document.body.innerHTML = "404 Not Found";
    return;
  }

  window.location.href = `view.html?id=${data.id}`;
}

redirect();
</script>
</body>
</html>
