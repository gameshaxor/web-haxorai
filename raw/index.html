<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Raw Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  background: #0d1117;
  color: #00ff9d;
  font-family: monospace;
  padding: 20px;
  white-space: pre-wrap;
}
</style>
</head>

<body id="content">Loading...</body>

<script>
const supabaseUrl = "https://efwgilbyldjvlbtrzwyn.supabase.co";
const supabaseKey = "sb_publishable_dhXYplciBTspJbYo2Q7p2Q_aJnf_vVL";

const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   GET SLUG
========================= */
function getSlug() {
  const params = new URLSearchParams(window.location.search);
  return params.get("slug");
}

/* =========================
   LOAD RAW
========================= */
async function loadRaw() {
  const slug = getSlug();

  if (!slug) {
    document.body.innerText = "Invalid slug";
    return;
  }

  const { data } = await sb
    .from("files")
    .select("*")
    .eq("slug", slug)
    .single();

  if (!data) {
    document.body.innerText = "Not found";
    return;
  }

  const res = await fetch(data.url);
  const text = await res.text();

  // tampilkan sebagai text (aman)
  document.getElementById("content").textContent = text;
}

loadRaw();
</script>

</body>
</html>
