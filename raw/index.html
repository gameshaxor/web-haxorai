<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HaxorAI Code Viewer</title>

<!-- Highlight.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js" defer></script>
</head>

<body>

<div class="topbar">
<div class="filename" id="fileName">
  <div class="skeleton filename-skeleton"></div>
</div>

  <div class="actions">
    <button onclick="copyCode()">Copy</button>
    <button onclick="downloadFile()">Download</button>
  </div>
</div>

<div class="code-container">
  <div class="lines" id="lines"></div>
<pre>
<code id="code">
<div class="code-skeleton">
  <span class="skeleton"></span>
  <span class="skeleton"></span>
  <span class="skeleton"></span>
  <span class="skeleton"></span>
  <span class="skeleton"></span>
  <span class="skeleton"></span>
</div>
</code>
</pre>
</div>

<script src="js/script.js" defer></script>

</body>
</html>
