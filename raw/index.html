<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HaxorAI Code Viewer</title>

<!-- Highlight.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
body {
  margin: 0;
  background: #0d1117;
  color: #c9d1d9;
  font-family: "Fira Code", monospace;
}

.topbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
}

.filename {
  color: #58a6ff;
  font-size: 14px;

  flex: 1;
  min-width: 0;

  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.actions {
  display: flex;
  gap: 8px;
}

.actions button {
  background: #21262d;
  border: 1px solid #30363d;
  color: #c9d1d9;
  padding: 5px 10px;
  border-radius: 5px;
}

.actions button:hover {
  background: #30363d;
  cursor: pointer;
}

.code-container {
  display: flex;
}

.lines {
  background: #161b22;
  padding: 15px 10px;
  text-align: right;
  color: #6e7681;
  user-select: none;
  font-size: 13px;
  line-height: 1.5;
}

pre {
  margin: 0;
  padding: 15px;
  overflow: auto;
  flex: 1;
}

code {
  font-size: 13px;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="filename" id="fileName">Loading...</div>

  <div class="actions">
    <button onclick="copyCode()">Copy</button>
    <button onclick="downloadFile()">Download</button>
  </div>
</div>

<div class="code-container">
  <div class="lines" id="lines"></div>
  <pre><code id="code">Loading...</code></pre>
</div>

<script>
let rawText = "";
let fileNameGlobal = "";

/* =========================
   GET SLUG (FIXED)
========================= */
function getSlug() {
  // 1. dari query
  const params = new URLSearchParams(window.location.search);
  let slug = params.get("slug");

  if (slug) return slug;

  // 2. dari path /raw/bjorka
  const path = window.location.pathname;

  if (path.startsWith("/raw/")) {
    slug = path.replace("/raw/", "").replace(/\/$/, "");
    return slug;
  }

  return null;
}

/* =========================
   COPY
========================= */
function copyCode() {
  navigator.clipboard.writeText(rawText);
  alert("Copied!");
}

/* =========================
   DOWNLOAD
========================= */
function downloadFile() {
  const blob = new Blob([rawText], { type: "text/html" });
  const a = document.createElement("a");
  const url = URL.createObjectURL(blob);
  a.href = url;
  a.download = fileNameGlobal || "file.html";
  a.click();

  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* =========================
   LINE NUMBERS
========================= */
function generateLines(text) {
  const count = text.split("\n").length;

  let html = "";
  for (let i = 1; i <= count; i++) {
    html += `<div>${i}</div>`;
  }

  document.getElementById("lines").innerHTML = html;
}

/* =========================
   LOAD RAW (FIXED)
========================= */
async function loadRaw() {
  const slug = getSlug();

  if (!slug) {
    document.body.innerHTML = "Invalid slug";
    return;
  }

const res = await fetch(
  `https://web.haxorai.com/api/raw?slug=${encodeURIComponent(slug)}`
);

const result = await res.json();

if (!result.success || !result.data) {
  document.body.innerHTML = "File not found";
  return;
}

const data = result.data;

  if (error || !data) {
    document.body.innerHTML = "File not found";
    return;
  }

  fileNameGlobal = data.name;
  document.getElementById("fileName").textContent = data.name;

  // 🔥 SET TITLE DINAMIS (PRO LEVEL)
  document.title = window.location.host + "/raw/" + data.slug;

  try {
    const res = await fetch(data.url);
let html = await res.text();

// 🔥 INJECT COMMENT
const injectedComment = `<!--
--  Uploaded on : https://web.haxorai.com/${data.slug}
--  Official Web : https://haxorai.com
--  web.haxorai.com/generator
-->
`;

rawText = injectedComment + html;
  } catch {
    document.body.innerHTML = "Failed to load file";
    return;
  }

  generateLines(rawText);

  hljs.configure({ ignoreUnescapedHTML: true });

  const result = hljs.highlightAuto(rawText);
  document.getElementById("code").innerHTML = result.value;
}

window.addEventListener("DOMContentLoaded", loadRaw);
</script>

</body>
</html>
