<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Sitemap | HaxorAI Web</title>
    <meta name="description" content="Explore the real-time sitemap of HaxorAI Web — a secure archive of HTML experiments, cyber art pages, and digital creative uploads indexed globally." />
    <meta name="keywords" content="haxorai sitemap, html archive index, deface archive list, web experiment index, cyber html gallery, realtime sitemap, hacker web archive, digital art pages, html file browser" />
    <meta name="author" content="Samuel Pasaribu" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#05070a" />
    <!-- OPEN GRAPH -->
    <meta property="og:title" content="Global Sitemap | HaxorAI Web" />
    <meta property="og:description" content="Realtime index of all HTML uploads, experimental web pages, and cyber archive content inside HaxorAI Web." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://web.haxorai.com/sitemap" />
    <meta property="og:site_name" content="HaxorAI Web" />
    <meta property="og:image" content="https://web.haxorai.com/thumbnail.png" />
    <!-- TWITTER CARD -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Global Sitemap | HaxorAI Web" />
    <meta name="twitter:description" content="Realtime HTML archive index of HaxorAI Web." />
    <meta name="twitter:image" content="https://web.haxorai.com/thumbnail.png" />
    <!-- CANONICAL -->
    <link rel="canonical" href="https://web.haxorai.com/sitemap" />
    <!-- ICONS -->
    <link rel="icon" type="image/x-icon" href="https://web.haxorai.com/favicon.ico" />
    <link rel="icon" type="image/png" href="https://web.haxorai.com/icon.png" />
    <link rel="apple-touch-icon" href="https://web.haxorai.com/apple-touch-icon.png" />
    <!-- STYLES -->
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js" defer></script>
</head>

<body>

    <div class="bg-grid"></div>

    <main class="container">

        <!-- HERO -->
        <section class="hero">

            <h1 class="hero-title">
                GLOBAL
                <span>SITEMAP</span>
            </h1>

            <p class="hero-sub">Explore realtime HTML uploads, deface pages, experimental web interfaces, and custom cyber projects published through the HaxorAI archive.</p>

            <div class="stats">

                <div class="stat-card">
                    <div class="stat-label">
                        Total Files
                    </div>

                    <div class="stat-value skeleton-stat" id="totalFiles">
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">
                        System Status
                    </div>

                    <div class="stat-value">
                        ONLINE
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">
                        Index Type
                    </div>

                    <div class="stat-value">
                        REALTIME
                    </div>
                </div>

            </div>

        </section>

        <!-- SEARCH -->
        <div class="search-wrap">

            <input type="text" id="searchInput" class="search-box" placeholder="Search filename..." />

            <div class="tabs-row">

                <a href="../" class="badge badge-link"><i class="dot"></i> <span>Home</span></a>

                <div id="dateTabs" class="tabs"></div>
            </div>

        </div>

        <!-- DATE MODAL -->
        <div id="dateModal" class="date-modal">

            <div class="date-modal-box">

                <div class="date-modal-head">

                    <div class="date-modal-title">
                        Filter By Date
                    </div>

                    <button class="date-close" onclick="closeDateModal()">×</button>

                </div>

                <div id="dateModalList" class="date-modal-list"></div>

            </div>

        </div>

        <!-- LIST -->
        <div id="sitemapList" class="list">

            <div class="skeleton-item">

                <div class="skeleton-left">

                    <div class="skeleton-line large"></div>

                    <div class="skeleton-meta">
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                    </div>

                </div>

                <div class="skeleton-btn"></div>

            </div>

            <div class="skeleton-item">

                <div class="skeleton-left">

                    <div class="skeleton-line large"></div>

                    <div class="skeleton-meta">
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                    </div>

                </div>

                <div class="skeleton-btn"></div>

            </div>

            <div class="skeleton-item">

                <div class="skeleton-left">

                    <div class="skeleton-line large"></div>

                    <div class="skeleton-meta">
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                    </div>

                </div>

                <div class="skeleton-btn"></div>

            </div>

        </div>

        <!-- FOOTER -->
        <div class="footer">
            © 2026
            <span>HaxorAI</span>
            — Global HTML Archive
        </div>

    </main>

    <script src="js/script.js" defer></script>

</body>

</html>
