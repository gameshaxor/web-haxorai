<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<iframe id="viewer" style="width:100%;height:100vh;border:none;"></iframe>

<script>
const supabaseUrl = "https://efwgilbyldjvlbtrzwyn.supabase.co";
const supabaseKey = "sb_publishable_dhXYplciBTspJbYo2Q7p2Q_aJnf_vVL";

const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

// ambil slug dari URL
const path = window.location.pathname;
const slug = path.split("/").pop().replace(".html", "");

async function load() {
  const { data, error } = await sb
    .from("files")
    .select("*")
    .eq("slug", slug)
    .single();

  if (error || !data) {
    document.body.innerHTML = "Not found";
    return;
  }

  const res = await fetch(data.url);
  const html = await res.text();

  document.getElementById("viewer").srcdoc = html;

  // increment view
  await sb.rpc("increment_views", { row_id: data.id });
}

load();
</script>

</body>
</html>
