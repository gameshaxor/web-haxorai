<!DOCTYPE html>
<html>
<head>
  <script>
    const path = window.location.pathname;
    const slug = path.split("/view/")[1];

    if (slug) {
      window.location.href = `/view.html?slug=${slug}`;
    } else {
      document.body.innerHTML = "Invalid URL";
    }
  </script>
</head>
<body></body>
</html>
