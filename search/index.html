<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Search | HaxorAI Web</title>
    <meta name="google" content="notranslate" />
    <meta name="author" content="Samuel Pasaribu" />
    <meta name="description" content="Search and discover HTML archive files, creative web experiments, and digital artifacts stored in the HaxorAI Web archive." />
    <meta name="keywords" content="haxorai search, html archive search, deface archive finder, web file search, script archive, html pages search, digital artifacts search, hacker web archive" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <meta name="Googlebot-Image" content="follow, all" />
    <!-- OPEN GRAPH -->
    <meta property="og:title" content="Search | HaxorAI Web" />
    <meta property="og:url" content="https://web.haxorai.com/search" />
    <meta property="og:description" content="Search through a curated archive of HTML experiments, web art, and digital scripts inside HaxorAI Web." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="HaxorAI Web" />
    <meta property="og:image" content="https://web.haxorai.com/thumbnail.png" />
    <!-- TWITTER CARD (optional but good SEO boost) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Search | HaxorAI Web" />
    <meta name="twitter:description" content="Search HTML archive files, web experiments, and digital artifacts." />
    <meta name="twitter:image" content="https://web.haxorai.com/thumbnail.png" />
    <!-- ICONS -->
    <link rel="icon" type="image/x-icon" href="https://web.haxorai.com/favicon.ico" />
    <link rel="icon" type="image/png" href="https://web.haxorai.com/icon.png" />
    <link rel="shortcut icon" type="image/x-icon" href="https://web.haxorai.com/icon.png" />
    <link rel="apple-touch-icon" href="https://web.haxorai.com/apple-touch-icon.png" />
    <!-- CANONICAL -->
    <link rel="canonical" href="https://web.haxorai.com/search" />
    <link rel="stylesheet" href="https://web.haxorai.com/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
</head>

<body>

    <!-- MOBILE HEADER -->
    <div class="mobile-header">
        <div class="mobile-logo">
            <a href="../" class="logo-link">HAXORAI WEB</a>
        </div>
        <div class="mobile-toggle" id="toggleBtn" onclick="toggleMenu()"></div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="container">

        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="logo"><a href="../" class="logo-link">HAXORAI WEB</a></div>
            <div class="menu">
                <a href="../generator" class="menu-generator">Generator</a>
                <a href="../sitemap" class="menu-sitemap">Sitemap</a>
            </div>
        </div>

        <!-- MAIN -->
        <div class="main">
            <div id="notifBox"></div>
            <!-- SEARCH INFO -->
            <div class="search-info-wrapper">
                <div>
                    <div id="searchTitle" class="search-title-text">Search Result</div>
                    <div id="searchInfo" class="search-info-box">
                        <div class="search-skeleton"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div id="paginationTop" class="pagination"></div>
                <!-- TABLE -->
                <table class="table">
                    <thead>
                        <tr>
                            <th>Search Results</th>
                            <th>Size</th>
                            <th>Open</th>
                            <th>Code</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="fileList"></tbody>
                </table>
                <div id="paginationBottom" class="pagination"></div>
            </div>
        </div>
    </div>

    <!-- FLOAT SEARCH -->
    <button class="search-float" onclick="openSearchModal()"></button>

    <!-- SEARCH MODAL -->
    <div id="searchModal" class="search-modal">
        <div class="search-box">
            <button class="search-close" type="button" onclick="closeSearchModal()"></button>
            <div class="search-title">
                Search Filename
            </div>
            <form onsubmit="submitSearch(event)">
                <div class="search-row">
                    <input type="text" id="searchInput" placeholder="example-file" autocomplete="off" required />
                    <button type="submit" class="search-submit"></button>
                </div>
            </form>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        © 2026 <span>haxorai.com</span>
    </footer>

    <script src="https://web.haxorai.com/search/js/script.js"></script>
</body>

</html>
